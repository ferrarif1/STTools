<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>上铁数字人统一身份认证平台</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@lottiefiles/lottie-player@latest"></script>
    <style>
        :root {
            --primary-color: #007BFF;
            --hover-color: #0056b3;
            --font-base: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffdde1, #a18cd1, #8ec5fc, #78ffd6, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            position: relative;
            width: 90%;
            max-width: 1300px;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.4);
            color: white;
            outline: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        .lottie-container {
            position: absolute;
            right: -160px;
            width: 450px;
            height: 450px;
            opacity: 0.85;
        }

        lottie-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .lottie-container {
                position: static;
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h2>上铁数字人统一身份认证平台</h2>
            <p style="font-size: 0.7rem;">
                欢迎使用上铁数字人统一身份认证平台！请使用云办公账户登录
            </p>
           
            <form action="/" method="POST">
                <div class="input-group">
                    <input type="text" id="account" name="account" placeholder="账号" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="密码" required>
                </div>
                <button type="submit">登录</button>
            </form>
        </div>
        <div class="lottie-container">
            <lottie-player src="https://assets10.lottiefiles.com/packages/lf20_w51pcehl.json" 
                background="transparent" speed="1" loop autoplay>
            </lottie-player>
        </div>
    </div>
</body>
</html>
