<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>完善个人信息</title>
    <script src="https://cdn.jsdelivr.net/npm/@lottiefiles/lottie-player@latest"></script>
    <style>
        /* 继承登录页面全部样式 */
        :root {
            --primary-color: #007BFF;
            --hover-color: #0056b3;
            --font-base: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffdde1, #a18cd1, #8ec5fc, #78ffd6, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            position: relative;
            width: 90%;
            max-width: 1300px;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            outline: none;
            margin-top: 8px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
        }

        label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9em;
            margin-bottom: 8px;
            display: block;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        .lottie-container {
            position: absolute;
            right: -160px;
            width: 450px;
            height: 450px;
            opacity: 0.85;
        }

        lottie-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .lottie-container {
                display: none;
            }
            .container {
                max-width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h2>个人信息完善</h2>
            <form id="infoForm" action="/info" method="POST">
                <div class="input-group">
                    <label>姓名</label>
                    <input type="text" name="name" placeholder="请输入真实姓名" required>
                </div>

                <div class="input-group">
                    <label>部门</label>
                    <input type="text" name="department" 
                           placeholder="请输入所在部门" 
                           required>
                </div>

                <div class="input-group">
                    <label>手机号</label>
                    <input type="tel" name="phone" 
                           pattern="1[3-9]\d{9}"
                           placeholder="请输入11位手机号码" 
                           required>
                </div>

                <div class="input-group">
                    <label>电子邮箱</label>
                    <input type="email" name="email" 
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
                           placeholder="example@company.com" 
                           required>
                </div>

                <button type="submit">提交信息</button>
            </form>
        </div>
        <div class="lottie-container">
            <lottie-player 
                src="https://assets10.lottiefiles.com/packages/lf20_w51pcehl.json" 
                background="transparent" 
                speed="0.8" 
                loop 
                autoplay>
            </lottie-player>
        </div>
    </div>

    <script>
        document.getElementById('infoForm').addEventListener('submit', function(e) {
            // 拦截表单提交，进行脱敏处理
            e.preventDefault();

            // 获取各字段元素
            var nameInput = document.querySelector('input[name="name"]');
            var phoneInput = document.querySelector('input[name="phone"]');
            var emailInput = document.querySelector('input[name="email"]');

            // 脱敏姓名：只保留首字符，其余替换为 *
            var nameVal = nameInput.value.trim();
            if(nameVal.length > 0) {
                nameInput.value = nameVal.charAt(0) + "*".repeat(nameVal.length - 1);
            }

            // 脱敏手机号：假设为11位号码，保留前三位和后四位，中间用 **** 替换
            var phoneVal = phoneInput.value.trim();
            if(phoneVal.length === 11) {
                phoneInput.value = phoneVal.substr(0, 3) + "****" + phoneVal.substr(7);
            }

            // 脱敏邮箱：对 @ 前的用户名进行部分隐藏
            var emailVal = emailInput.value.trim();
            if(emailVal.indexOf("@") !== -1) {
                var parts = emailVal.split("@");
                var username = parts[0];
                if(username.length > 2) {
                    emailInput.value = username.charAt(0) + "****" + username.charAt(username.length - 1) + "@" + parts[1];
                } else {
                    emailInput.value = username + "****@" + parts[1];
                }
            }

            // 提交脱敏后的表单
            e.target.submit();
        });
    </script>
</body>
</html>
