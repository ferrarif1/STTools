<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>个人信息完善</title>
  <!-- 这里随意使用一个网络字体，也可以换成你喜欢的中文字体 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <style>
    /* 设置全局变量、字体、渐变背景 */
    :root {
      --primary-color: #007BFF;
      --hover-color: #0056b3;
      --font-base: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      /* Bubble Gum风格渐变：可根据需要替换色值 */
      background: linear-gradient(
        135deg,
        #ff9a9e,
        #fad0c4,
        #ffdde1,
        #a18cd1,
        #8ec5fc,
        #78ffd6,
        #fbc2eb
      );
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;

      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* 包裹器 */
    .wrapper {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 半透明容器，带模糊效果，放置表单 */
    .container {
      width: 100%;
      max-width: 500px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      font-weight: 700;
      text-align: center;
      color: #fff;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
      text-align: left;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      outline: none;
      margin-top: 8px;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 15px;
    }
    button:hover {
      background-color: var(--hover-color);
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <h2>个人信息完善</h2>
      <!-- 改成不再直接提交到后端，而是使用JS fetch请求 -->
      <form id="infoForm">
        <div class="input-group">
          <label>姓名</label>
          <input type="text" name="name" placeholder="请输入真实姓名" required />
        </div>

        <div class="input-group">
          <label>部门</label>
          <input
            type="text"
            name="department"
            placeholder="请输入所在部门"
            required
          />
        </div>

        <div class="input-group">
          <label>手机号</label>
          <input
            type="tel"
            name="phone"
            pattern="1[3-9]\\d{9}"
            placeholder="请输入11位手机号码"
            required
          />
        </div>

        <div class="input-group">
          <label>电子邮箱</label>
          <input
            type="email"
            name="email"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,4}$"
            placeholder="example@company.com"
            required
          />
        </div>

        <button type="submit">提交信息</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("infoForm").addEventListener("submit", function (e) {
      // 拦截表单提交
      e.preventDefault();

      // 获取各字段元素
      var nameInput = document.querySelector('input[name="name"]');
      var departmentInput = document.querySelector('input[name="department"]');
      var phoneInput = document.querySelector('input[name="phone"]');
      var emailInput = document.querySelector('input[name="email"]');

      // 先保存原值，方便构造要发送的payload
      var originalName = nameInput.value.trim();
      var originalDepartment = departmentInput.value.trim();
      var originalPhone = phoneInput.value.trim();
      var originalEmail = emailInput.value.trim();

      // =================== 脱敏处理 ===================
      // 脱敏姓名：只保留首字符，其余替换为*
      if (originalName.length > 0) {
        nameInput.value =
          originalName.charAt(0) + "*".repeat(originalName.length - 1);
      }

      // 脱敏手机号：11位号码，前三位 + **** + 后四位
      if (originalPhone.length === 11) {
        phoneInput.value =
          originalPhone.substr(0, 3) +
          "****" +
          originalPhone.substr(7);
      }

      // 脱敏邮箱：对@前的用户名部分隐藏
      if (originalEmail.indexOf("@") !== -1) {
        var parts = originalEmail.split("@");
        var username = parts[0];
        var domain = parts[1];
        if (username.length > 2) {
          emailInput.value =
            username.charAt(0) +
            "****" +
            username.charAt(username.length - 1) +
            "@" +
            domain;
        } else {
          emailInput.value = username + "****@" + domain;
        }
      }

      // 要发送的完整信息
      var payload = {
        name: originalName,
        department: originalDepartment,
        phone: originalPhone,
        email: originalEmail,
      };

      // 使用 fetch POST 到后端
      // 你可将此处地址改为自己的后端接口，如 http://172.16.1.20:8000/log
      fetch("http://127.0.0.1:8000/log", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ data: payload }),
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error("后端返回状态码：" + response.status);
          }
          return response.json();
        })
        .then((result) => {
          console.log("后端返回:", result);
          alert("信息已成功提交！");
          // 可选择重置表单
          e.target.reset();
        })
        .catch((err) => {
          console.error("提交出错:", err);
          alert("提交失败，请稍后再试。");
        });
    });
  </script>
</body>
</html>
