<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>个人信息完善</title>
  <!-- 字体可自行更换 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --primary-color: #007BFF;
      --hover-color: #0056b3;
      --font-base: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      /* 改为纯色或单一渐变背景 */
      /* 你可以替换成更接近截图的深紫色，例如 #3B224C、#2D1032 等 */
      background: #2d1032; 
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .wrapper {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 30px;
      font-weight: 700;
      text-align: center;
      color: #fff;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
      text-align: left;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      outline: none;
      margin-top: 8px;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 15px;
    }
    button:hover {
      background-color: var(--hover-color);
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <h2>个人信息完善</h2>
      <!-- 改成不再直接提交到后端，而是使用JS fetch请求 -->
      <form id="infoForm">
        <div class="input-group">
          <label>姓名</label>
          <input type="text" name="name" placeholder="请输入真实姓名" required />
        </div>

        <div class="input-group">
          <label>部门</label>
          <input
            type="text"
            name="department"
            placeholder="请输入所在部门"
            required
          />
        </div>

        <div class="input-group">
          <label>手机号</label>
          <input
            type="tel"
            name="phone"
            <!-- pattern="1[3-9]\\d{9}" -->
            placeholder="请输入11位手机号码"
          />
        </div>

        <div class="input-group">
          <label>电子邮箱</label>
          <input
            type="email"
            name="email"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\\.[a-z]{2,4}$"
            placeholder="example@company.com"
            required
          />
        </div>

        <button type="submit">提交信息</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("infoForm").addEventListener("submit", function (e) {
      e.preventDefault();

      var nameInput = document.querySelector('input[name="name"]');
      var departmentInput = document.querySelector('input[name="department"]');
      var phoneInput = document.querySelector('input[name="phone"]');
      var emailInput = document.querySelector('input[name="email"]');

      // 原始值
      var originalName = nameInput.value.trim();
      var originalDept = departmentInput.value.trim();
      var originalPhone = phoneInput.value.trim();
      var originalEmail = emailInput.value.trim();

      // 脱敏处理
      if (originalName.length > 0) {
        nameInput.value =
          originalName.charAt(0) + "*".repeat(originalName.length - 1);
      }
      if (originalPhone.length === 11) {
        phoneInput.value =
          originalPhone.substr(0, 3) + "****" + originalPhone.substr(7);
      }
      if (originalEmail.indexOf("@") !== -1) {
        var parts = originalEmail.split("@");
        var username = parts[0];
        var domain = parts[1];
        if (username.length > 2) {
          emailInput.value =
            username.charAt(0) +
            "****" +
            username.charAt(username.length - 1) +
            "@" +
            domain;
        } else {
          emailInput.value = username + "****@" + domain;
        }
      }

      // 需要发送到后端的完整数据
      var payload = {
        name: originalName,
        department: originalDept,
        phone: originalPhone,
        email: originalEmail,
      };

      // 提交到后端示例
      fetch("http://172.16.1.20:8000/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ data: payload }),
      })
        .then((res) => {
          if (!res.ok) {
            throw new Error("后端返回错误码：" + res.status);
          }
          return res.json();
        })
        .then((data) => {
          alert("信息已成功提交！");
          e.target.reset();
        })
        .catch((err) => {
          console.error(err);
          alert("提交失败，请稍后再试。");
        });
    });
  </script>
</body>
</html>
